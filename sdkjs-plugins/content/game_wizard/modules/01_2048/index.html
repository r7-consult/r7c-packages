<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>

    <script type="text/javascript" src="scripts/plugin-fallback.js"></script>

    <link rel="stylesheet" href="../../styles/game-shell.css">
    <link rel="stylesheet" href="styles/slider-plugin.css">

    <script type="text/javascript" src="scripts/constants.js"></script>
    <script type="text/javascript" src="scripts/utils/Logger.js"></script>
    <script type="text/javascript" src="scripts/core/ErrorHandler.js"></script>
    <script type="text/javascript" src="scripts/core/GameManagerBase.js"></script>
    <script type="text/javascript" src="scripts/core/GameTypeRegistry.js"></script>
    <script type="text/javascript" src="scripts/core/Game2048Engine.js"></script>
    <script type="text/javascript" src="scripts/core/Game2048Manager.js"></script>
    <script type="text/javascript" src="scripts/ui/ThemeManager.js"></script>
    <script type="text/javascript" src="scripts/ui/UIController.js"></script>
</head>
<body>
    <div class="stars-bg" id="stars"></div>

    <div class="slider-plugin-container">
        <div class="plugin-header">
            <a href="https://data.slider-ai.ru/?utm_source=casual_games%2F" target="_blank" rel="noopener noreferrer" class="slider-logo-link" title="Visit Slider AI">
                <img src="../../resources/images/slider.svg" class="slider-logo" alt="Slider AI">
            </a>
            <div class="game-title-group">
                <h1 class="game-title">2048</h1>
                <p class="game-subtitle">Merge tiles and beat your best score</p>
            </div>
            <a href="https://data.slider-ai.ru/?utm_source=casual_games%2F" target="_blank" rel="noopener noreferrer" class="mascot-link" title="Visit Slider AI">
                <img src="../../resources/images/astronaut.png" class="astronaut-mascot" alt="Astronaut">
            </a>
        </div>

        <div class="score-section">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div class="score-value" id="current-score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Best</div>
                <div class="score-value" id="best-score">0</div>
            </div>
        </div>

        <div id="game-board"></div>

        <div class="control-buttons">
            <button class="btn-plugin primary" id="new-game-btn">New Game</button>
            <button class="btn-plugin secondary" id="btn-undo">Undo</button>
        </div>
    </div>

    <div class="notification-container" id="notification-container"></div>

    <script type="text/javascript" src="scripts/app.js"></script>
</body>
</html>
