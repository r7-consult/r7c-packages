<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>

    <link rel="stylesheet" href="../../styles/game-shell.css">
    <link rel="stylesheet" href="styles/main.css">

    <script type="text/javascript" src="scripts/constants.js"></script>
    <script type="text/javascript" src="scripts/utils/Logger.js"></script>
    <script type="text/javascript" src="scripts/core/ErrorHandler.js"></script>
    <script type="text/javascript" src="scripts/core/ChessMoveValidator.js"></script>
    <script type="text/javascript" src="scripts/core/ChessEngine.js"></script>
    <script type="text/javascript" src="scripts/core/ChessAI.js"></script>
    <script type="text/javascript" src="scripts/core/GameManager.js"></script>
    <script type="text/javascript" src="scripts/core/AIOpponentManager.js"></script>
    <script type="text/javascript" src="scripts/ui/ThemeManager.js"></script>
    <script type="text/javascript" src="scripts/ui/SimpleBoardRenderer.js"></script>
    <script type="text/javascript" src="scripts/ui/BoardRenderer.js"></script>
    <script type="text/javascript" src="scripts/ui/UIController.js"></script>
    <script type="text/javascript" src="scripts/core/ChessPluginLifecycleManager.js"></script>
</head>
<body>
    <div class="slider-plugin-container chess-shell">
        <div class="plugin-header">
            <a href="https://data.slider-ai.ru/?utm_source=casual_games%2F" target="_blank" rel="noopener noreferrer" class="slider-logo-link" title="Visit Slider AI">
                <img src="../../resources/images/slider.svg" class="slider-logo" alt="Slider AI">
            </a>
            <div class="game-title-group">
                <h1 class="game-title">Chess</h1>
                <p class="game-subtitle">Play against AI with selectable difficulty</p>
            </div>
            <a href="https://data.slider-ai.ru/?utm_source=casual_games%2F" target="_blank" rel="noopener noreferrer" class="mascot-link" title="Visit Slider AI">
                <img src="../../resources/images/astronaut.png" class="astronaut-mascot" alt="Astronaut">
            </a>
        </div>

        <div class="score-section chess-score-section">
            <div class="score-box chess-status-box">
                <div class="score-label">Status</div>
                <div class="score-value chess-status-value">
                    <span class="status-indicator" id="connection-status"></span>
                    <span id="game-status-text">Initializing...</span>
                </div>
            </div>
            <div class="score-box player-box" id="white-player">
                <span>White: You</span>
            </div>
            <div class="score-box player-box" id="black-player">
                <span>Black: Computer (Medium)</span>
            </div>
        </div>

        <div id="game-board" class="chess-board-shell">
            <div id="chess"></div>
            <div class="loading-overlay" id="loading-overlay">
                <div class="loading-spinner"></div>
            </div>
        </div>

        <div class="control-buttons chess-controls">
            <div class="move-history" id="move-history">No moves yet</div>

            <label class="difficulty-selector" for="ai-difficulty">
                <span class="difficulty-label">AI</span>
                <select id="ai-difficulty" class="difficulty-select">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                    <option value="expert">Expert</option>
                </select>
            </label>

            <button class="btn-plugin secondary" id="undo-btn" disabled>Undo</button>
            <button class="btn-plugin secondary" id="resign-btn" disabled>Resign</button>
            <button class="btn-plugin primary" id="new-game-btn">New Game</button>

            <button class="btn-plugin ghost standalone-only" id="cancel-btn" title="Cancel">Cancel</button>
            <button class="btn-plugin danger standalone-only" id="close-btn" title="Close">Close</button>
        </div>
    </div>

    <div class="notification-container" id="notification-container"></div>

    <script type="text/javascript">
        (function() {
            if (!(window.Asc && window.Asc.plugin)) {
                document.body.classList.add('standalone-mode');
            }
        })();
    </script>
    <script type="text/javascript" src="scripts/main.js"></script>
</body>
</html>
