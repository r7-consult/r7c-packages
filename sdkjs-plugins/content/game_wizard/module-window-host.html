<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hosted Module Window</title>
  <link rel="stylesheet" href="vendor/oo/plugins.css">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
    }

    .host-shell {
      width: 100%;
      height: 100%;
    }

    .host-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
  <script src="vendor/oo/plugins.js"></script>
  <script src="vendor/oo/plugins-ui.js"></script>
  <script src="scripts/module-window-host.js"></script>
</head>
<body>
  <div class="host-shell">
    <div id="module-window-status" class="visually-hidden" aria-live="polite">Инициализация...</div>
    <iframe id="module-window-frame" class="host-frame" title="Hosted Module"></iframe>
  </div>
</body>
</html>
